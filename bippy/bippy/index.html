<!DOCTYPE html>
<html>

<head>
    <title>Contact Form</title>
</head>

<body>

    <div class="container">
        <h2>Contact us</h2>

        <form class="contactForm" action="submit" method="POST">
            <table>

                <tr>
                    <td>First Name</td>
                    <td>Last Name</td>
                </tr>

                <tr>
                    <td><input type="text" id="fname"></td>
                    <td><input type="text" id="lname"></td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td>Phone Number</td>
                </tr>

                <tr>
                    <td><input type="email" id="email" placeholder="Bappi"></td>
                    <td><input type="text" id="phone"></td>
                </tr>

                <tr>
                    <td colspan="2">What do you have in mind?</td>
                </tr>

                <tr>
                    <td colspan="2">
                        <textarea id="message"></textarea>
                    </td>
                </tr>

            </table>
            <button type="submit">Submit</button>
        </form>

    </div>

    <script src="./index.js"></script>
    <link rel="stylesheet" href="./idex.css">


</body>

</html>

<!doctype html>
<html>
  <head>
    <title>Product Management</title>
    <link rel="stylesheet" href="../Design/style.css" />
  </head>

  <body>
    <div class="container">
      <form>
        <fieldset>
          <legend>Product Management Page</legend>

          <strong>Unit Price:</strong>

        </fieldset>
      </form>
    </div>

    <script src="../JS/validation.js"></script>
  </body>
</html>

<!doctype html>
<html lang="eng">
  <title>Student Registration Page</title>
  <head>
    <h1>Student Registration Page</h1>
  </head>
  <form>
    <label for="studentName"> student Name: </label>
    <input type="text" id="studentName" name="placeholder" ="Enter The Name" />
    <br /><br />

    <label for="Student CGPA"> Student CGPA: </label>
    <input type="number" id="Student CGPA" name="Student CGPA" />
    <br /><br />

    <label for="GenderMale">Male</label>
    <input type="radio" id="GenderMale" name="Gender" value="Male" />
    <br /><br />

    <label for="GenderFemale">Female</label>
    <input type="radio" id="GenderFemale" name="Gender" value="Female" />
    <br /><br />

    <label for="Student department">Student Department's</label>
    <input type="check box" id="" name="Department" value="CSE" />
    <br /><br />

    <label for="Student ID">Student ID </label>
    <input type="number" id="Student ID " name="Student" value="ID" />
    <br /><br />

    <label for="Address">Address:</label>
    <textarea
      id="Address"
      name="Address"
      rows="4"
      cols="25"
      placeholder="Enter The Address"
    ></textarea>
    <br /><br />

    <label for="DOB"> Date of Birth: </label>
    <input type="date" id="DOB" name="DOB" />
    <br /><br />

    <label for="Email">Email </label>
    <input type="email" id="Email" name="Email" />
    <br /><br />

    <label for="InsertFile">Upload your grade report:</label>
    <input type="file" id="InsertFile" name="InsertFile" />
    <br /><br />

    <label for="I agree to the terms and conditions"
      >I agree to the terms and conditions:</label
    >
    <input
      type="radio"
      id="I agree to the terms and conditions"
      name="I agree to the terms and conditions"
    />
    <br /><br />

    <label for="Phone Number">Phone Number:</label>
    <input type="number" id="Phone Number" name="Phone Number" />
    <br /><br />

    <label for="Information">Submit your information:</label>
    <input type="submit" id="submit" name="submit" />
    <br /><br />
  </form>
</html>
